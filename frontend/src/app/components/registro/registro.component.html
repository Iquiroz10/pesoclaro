<div class="registro-container">
  <mat-card class="registro-card">

    <mat-card-header>
      <mat-card-title>PesoClaro</mat-card-title>
      <mat-card-subtitle>Crea tu cuenta gratuita</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="registro()">

        <mat-form-field appearance="outline" class="campo-completo">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre"
                 placeholder="Tu nombre completo">
          <mat-error *ngIf="form.get('nombre')?.hasError('required')">
            El nombre es requerido.
          </mat-error>
          <mat-error *ngIf="form.get('nombre')?.hasError('minlength')">
            Mínimo 2 caracteres.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="campo-completo">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email"
                 type="email" placeholder="tu@email.com">
          <mat-error *ngIf="form.get('email')?.hasError('required')">
            El email es requerido.
          </mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">
            Ingresa un email válido.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="campo-completo">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password"
                 type="password" placeholder="Mínimo 6 caracteres">
          <mat-error *ngIf="form.get('password')?.hasError('required')">
            La contraseña es requerida.
          </mat-error>
          <mat-error *ngIf="form.get('password')?.hasError('minlength')">
            Mínimo 6 caracteres.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="campo-completo">
          <mat-label>Confirmar contraseña</mat-label>
          <input matInput formControlName="confirmar"
                 type="password" placeholder="Repite tu contraseña">
          <mat-error *ngIf="form.hasError('noCoinciden')">
            Las contraseñas no coinciden.
          </mat-error>
        </mat-form-field>

        <div *ngIf="error" class="error-mensaje">
          {{ error }}
        </div>

        <button mat-raised-button color="primary"
                type="submit" class="campo-completo"
                [disabled]="form.invalid || cargando">
          <mat-spinner *ngIf="cargando" diameter="20"></mat-spinner>
          <span *ngIf="!cargando">Crear cuenta</span>
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions>
      <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
    </mat-card-actions>

  </mat-card>
</div>
